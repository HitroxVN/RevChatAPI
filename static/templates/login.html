<!-- Phần Đăng nhập -->
<div id="loginSection" class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="w-full max-w-md p-10 card shadow-2xl mx-4">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-yellow-500/10 rounded-3xl mb-6 glass">
                <i data-lucide="lock" class="w-10 h-10 text-yellow-500"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">RevChatAPI Admin</h1>
            <p class="text-neutral-400 mt-3 font-medium">Nhập admin key để quản trị hệ thống</p>
        </div>

        <div id="loginError" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl text-center backdrop-blur-md"></div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-neutral-400 mb-2 ml-1">Admin Key</label>
                <input type="password" id="adminKey" class="w-full input-dark p-4 text-lg" placeholder="••••••••••••">
            </div>
            <button onclick="login()" class="w-full btn-gold py-4 rounded-2xl flex items-center justify-center gap-2 text-lg">
                <span>Đăng nhập</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>
</div>
