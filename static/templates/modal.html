<!-- Modal Tạo/Chỉnh sửa -->
<div id="keyModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center modal-backdrop p-4">
    <div class="w-full max-w-lg card shadow-2xl border border-white/10 bg-[#1c1c1e]/80">
        <div class="p-8 border-b border-white/5 flex items-center justify-between">
            <h3 class="text-2xl font-bold text-white tracking-tight" id="modalTitle">Tạo API Key Mới</h3>
            <button onclick="closeModal()" class="text-neutral-500 hover:text-white transition-all transform hover:rotate-90">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
        </div>
        <div class="p-8 space-y-6">
            <input type="hidden" id="modalKeyId">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-neutral-400 ml-1">TÊN KEY *</label>
                <input type="text" id="modalKeyName" class="w-full input-dark p-4 text-base" placeholder="vd: Khách hàng Production">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-neutral-400 ml-1">MÔ TẢ / GHI CHÚ</label>
                <textarea id="modalKeyDescription" class="w-full input-dark p-4 text-base h-32 resize-none" placeholder="Thêm ghi chú cho key này..."></textarea>
            </div>
        </div>
        <div class="p-8 border-t border-white/5 flex justify-end gap-4">
            <button onclick="closeModal()" class="px-8 py-4 rounded-2xl bg-white/5 text-white hover:bg-white/10 font-bold transition-all text-base border border-white/5">
                Hủy
            </button>
            <button id="modalSubmitBtn" onclick="submitModal()" class="px-8 py-4 rounded-2xl btn-gold font-bold text-base">
                Lưu Thay đổi
            </button>
        </div>
    </div>
</div>
