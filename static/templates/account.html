<!-- Phần Quản lý Tài khoản -->
<div id="accountSection" class="hidden max-w-4xl mx-auto">
    <header class="mb-10">
        <h1 class="text-4xl font-extrabold text-white tracking-tight">Quản lý Tài khoản</h1>
        <p class="text-neutral-400 mt-2 text-lg font-medium">Cấu hình thông tin đăng nhập và cài đặt dịch vụ bên ngoài.</p>
    </header>

    <div class="grid grid-cols-1 gap-8">
        <div class="card p-8 shadow-2xl">
            <div class="flex items-center gap-4 mb-8">
                <div class="p-3 bg-yellow-500/10 rounded-2xl">
                    <i data-lucide="shield-check" class="w-8 h-8 text-yellow-500"></i>
                </div>
                <h3 class="text-2xl font-bold text-white tracking-tight">ChatX Provider</h3>
            </div>
            
            <div class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-neutral-400 ml-1 tracking-wide uppercase">Địa chỉ Email</label>
                        <input type="email" id="chatxEmail" class="w-full input-dark p-4 text-base" placeholder="email@example.com">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-neutral-400 ml-1 tracking-wide uppercase">Mật khẩu Tài khoản</label>
                        <input type="password" id="chatxPassword" class="w-full input-dark p-4 text-base" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between p-6 bg-white/5 rounded-[24px] border border-white/5">
                    <div>
                        <div class="text-lg font-bold text-white tracking-tight">Tự động Xóa Lịch sử</div>
                        <div class="text-sm text-neutral-400 mt-1">Tự động xóa lịch sử chat sau mỗi request để đảm bảo ngữ cảnh sạch.</div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chatxAutoClear" class="sr-only peer">
                        <div class="w-14 h-7 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-yellow-500 shadow-inner"></div>
                    </label>
                </div>

                <div class="flex justify-end pt-4">
                    <button onclick="updateChatXAccount()" id="saveAccountBtn" class="btn-gold px-10 py-4 rounded-2xl flex items-center gap-3 text-lg">
                        <i data-lucide="save" class="w-6 h-6"></i>
                        <span>Lưu Cấu hình</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
