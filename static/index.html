<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevChatAPI - Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/admin/assets/css/style.css">
</head>
<body class="min-h-screen flex">

    <!-- Container cho Phần Đăng nhập -->
    <div id="loginContainer"></div>

    <!-- Container cho Dashboard Chính -->
    <div id="dashboardSection" class="hidden flex w-full">
        <!-- Container cho Sidebar -->
        <div id="sidebarContainer"></div>

        <!-- Vùng Nội dung Chính -->
        <main class="flex-1 ml-72 p-10 min-h-screen">
            <div id="keysSectionContainer"></div>
            <div id="accountSectionContainer"></div>
            <div id="testSectionContainer"></div>
        </main>
    </div>

    <!-- Container cho Modals -->
    <div id="modalContainer"></div>

    <script type="module" src="/admin/assets/js/main.js"></script>
    <script>
        window.addEventListener('error', function(e) {
            console.error('Lỗi JS:', e.error);
            const debug = document.createElement('div');
            debug.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(255,0,0,0.8);color:white;padding:10px;z-index:9999;font-family:monospace;font-size:12px;';
            debug.innerText = 'LỖI JS: ' + e.message + ' tại ' + e.filename + ':' + e.lineno;
            document.body.appendChild(debug);
        });
    </script>
</body>
</html>
